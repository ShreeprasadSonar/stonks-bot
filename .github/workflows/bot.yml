name: StockBot — Run 24/7

on:
  workflow_dispatch:  # Manual start
  schedule:
    - cron: '0 */5 * * *'  # Auto-restart every 5 hours (before the 6h kill limit)

concurrency:
  group: stockbot-run
  cancel-in-progress: true  # New run cancels old one — keeps only one instance alive

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5h — exits cleanly before GitHub's hard 6h kill

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run StockBot
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT:     StockBot/1.0
        run: python main.py
